<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과제 투두리스트</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #222;
      --muted: #6b7280;
      --line: #dbe1ea;
      --primary: #2563eb;
      --doing: #f59e0b;
      --done: #10b981;
      --todo: #6366f1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
    }

    .app {
      max-width: 1050px;
      margin: 24px auto;
      padding: 0 16px 28px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.06);
      padding: 16px;
    }

    h1 { margin: 0 0 6px; font-size: 26px; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    p { margin: 0; color: var(--muted); font-size: 13px; }

    .stack { display: grid; gap: 10px; }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    input, select, textarea, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px;
      width: 100%;
      background: #fff;
    }

    textarea { min-height: 72px; resize: vertical; }

    button {
      cursor: pointer;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    button.sub {
      background: #eef2ff;
      color: #374151;
      border: 1px solid #c7d2fe;
    }

    .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    .stat strong { display: block; font-size: 20px; color: var(--text); margin-top: 2px; }

    .progress {
      margin-top: 10px;
      height: 10px;
      width: 100%;
      border-radius: 999px;
      background: #e7ecf3;
      overflow: hidden;
    }

    .progress > div { height: 100%; background: linear-gradient(90deg, #34d399, #10b981); width: 0%; }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 130px 120px 110px;
      gap: 8px;
      margin-bottom: 12px;
    }

    .list { display: grid; gap: 8px; }

    .task {
      border: 1px solid var(--line);
      border-left-width: 6px;
      border-radius: 10px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .task.todo { border-left-color: var(--todo); }
    .task.doing { border-left-color: var(--doing); }
    .task.done { border-left-color: var(--done); opacity: 0.78; }

    .task-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .task-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
    }

    .chip {
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
    }

    .chip.high { background: #fee2e2; border-color: #fecaca; color: #991b1b; }
    .chip.mid { background: #fef3c7; border-color: #fde68a; color: #92400e; }
    .chip.low { background: #dcfce7; border-color: #bbf7d0; color: #166534; }

    .task-actions {
      display: grid;
      grid-template-columns: 130px 96px;
      gap: 8px;
      justify-content: end;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 24px 12px;
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .task-actions { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>과제 투두리스트</h1>
      <p>과목별/우선순위별로 정리하고, 진행률을 확인하며 과제를 체계적으로 관리하세요.</p>

      <div class="stats">
        <div class="stat">전체 <strong id="totalCount">0</strong></div>
        <div class="stat">진행중 <strong id="doingCount">0</strong></div>
        <div class="stat">완료 <strong id="doneCount">0</strong></div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <p id="progressText" style="margin-top:6px;">완료율 0%</p>

      <hr style="margin: 16px 0; border: 0; border-top: 1px solid var(--line);" />

      <h2>새 과제 추가</h2>
      <form id="taskForm" class="stack">
        <div>
          <label for="title">할 일</label>
          <input id="title" required placeholder="예: 자료구조 과제 2 보고서 작성" />
        </div>
        <div class="quick">
          <div>
            <label for="subject">과목/프로젝트</label>
            <input id="subject" required placeholder="예: 자료구조" />
          </div>
          <div>
            <label for="dueDate">마감일</label>
            <input id="dueDate" type="date" required />
          </div>
        </div>
        <div class="quick">
          <div>
            <label for="priority">우선순위</label>
            <select id="priority">
              <option value="high">높음</option>
              <option value="medium" selected>중간</option>
              <option value="low">낮음</option>
            </select>
          </div>
          <div>
            <label for="status">상태</label>
            <select id="status">
              <option value="todo" selected>할 일</option>
              <option value="doing">진행중</option>
              <option value="done">완료</option>
            </select>
          </div>
        </div>
        <div>
          <label for="note">메모</label>
          <textarea id="note" placeholder="필요한 참고자료, 세부 계획 등을 적어두세요."></textarea>
        </div>
        <button type="submit">과제 추가</button>
      </form>
    </section>

    <section class="card">
      <h2>과제 목록</h2>
      <div class="toolbar">
        <input id="searchInput" placeholder="검색 (할 일/과목/메모)" />
        <select id="filterStatus">
          <option value="all">전체 상태</option>
          <option value="todo">할 일</option>
          <option value="doing">진행중</option>
          <option value="done">완료</option>
        </select>
        <select id="filterPriority">
          <option value="all">전체 우선순위</option>
          <option value="high">높음</option>
          <option value="medium">중간</option>
          <option value="low">낮음</option>
        </select>
        <button id="clearDoneBtn" type="button" class="sub">완료 삭제</button>
      </div>
      <div id="taskList" class="list"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "assignment_todos_v1";

    const taskForm = document.getElementById("taskForm");
    const taskList = document.getElementById("taskList");
    const searchInput = document.getElementById("searchInput");
    const filterStatus = document.getElementById("filterStatus");
    const filterPriority = document.getElementById("filterPriority");
    const clearDoneBtn = document.getElementById("clearDoneBtn");

    const totalCount = document.getElementById("totalCount");
    const doingCount = document.getElementById("doingCount");
    const doneCount = document.getElementById("doneCount");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    let tasks = loadTasks();

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function formatDate(dateString) {
      const date = new Date(dateString + "T00:00:00");
      return new Intl.DateTimeFormat("ko-KR", { month: "short", day: "numeric", weekday: "short" }).format(date);
    }

    function priorityLabel(priority) {
      if (priority === "high") return { text: "높음", className: "high" };
      if (priority === "low") return { text: "낮음", className: "low" };
      return { text: "중간", className: "mid" };
    }

    function statusLabel(status) {
      if (status === "doing") return "진행중";
      if (status === "done") return "완료";
      return "할 일";
    }

    function updateSummary() {
      const total = tasks.length;
      const doing = tasks.filter((t) => t.status === "doing").length;
      const done = tasks.filter((t) => t.status === "done").length;
      const rate = total ? Math.round((done / total) * 100) : 0;

      totalCount.textContent = total;
      doingCount.textContent = doing;
      doneCount.textContent = done;
      progressBar.style.width = `${rate}%`;
      progressText.textContent = `완료율 ${rate}%`;
    }

    function filteredTasks() {
      const keyword = searchInput.value.trim().toLowerCase();
      return [...tasks]
        .filter((task) => filterStatus.value === "all" || task.status === filterStatus.value)
        .filter((task) => filterPriority.value === "all" || task.priority === filterPriority.value)
        .filter((task) => {
          if (!keyword) return true;
          return [task.title, task.subject, task.note].join(" ").toLowerCase().includes(keyword);
        })
        .sort((a, b) => {
          if (a.status !== b.status) {
            const order = { todo: 0, doing: 1, done: 2 };
            return order[a.status] - order[b.status];
          }
          if (a.priority !== b.priority) {
            const order = { high: 0, medium: 1, low: 2 };
            return order[a.priority] - order[b.priority];
          }
          return a.dueDate.localeCompare(b.dueDate);
        });
    }

    function renderTasks() {
      const visible = filteredTasks();
      if (!visible.length) {
        taskList.innerHTML = '<div class="empty">조건에 맞는 과제가 없습니다.</div>';
        updateSummary();
        return;
      }

      taskList.innerHTML = visible.map((task) => {
        const pr = priorityLabel(task.priority);
        return `
          <article class="task ${task.status}">
            <div class="task-top">
              <h3 class="task-title">${task.title}</h3>
              <div class="meta">
                <span class="chip">${statusLabel(task.status)}</span>
                <span class="chip ${pr.className}">우선순위 ${pr.text}</span>
              </div>
            </div>
            <div class="meta">
              <span class="chip">${task.subject}</span>
              <span class="chip">마감 ${formatDate(task.dueDate)}</span>
            </div>
            ${task.note ? `<p style="font-size:13px; margin:0;">${task.note}</p>` : ""}
            <div class="task-actions">
              <select data-action="status" data-id="${task.id}">
                <option value="todo" ${task.status === "todo" ? "selected" : ""}>할 일</option>
                <option value="doing" ${task.status === "doing" ? "selected" : ""}>진행중</option>
                <option value="done" ${task.status === "done" ? "selected" : ""}>완료</option>
              </select>
              <button data-action="delete" data-id="${task.id}" class="sub" type="button">삭제</button>
            </div>
          </article>
        `;
      }).join("");

      updateSummary();
    }

    taskForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const task = {
        id: crypto.randomUUID(),
        title: document.getElementById("title").value.trim(),
        subject: document.getElementById("subject").value.trim(),
        dueDate: document.getElementById("dueDate").value,
        priority: document.getElementById("priority").value,
        status: document.getElementById("status").value,
        note: document.getElementById("note").value.trim(),
      };

      if (!task.title || !task.subject || !task.dueDate) return;

      tasks.push(task);
      saveTasks();
      taskForm.reset();
      document.getElementById("priority").value = "medium";
      document.getElementById("status").value = "todo";
      renderTasks();
    });

    taskList.addEventListener("click", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;

      if (target.dataset.action === "delete") {
        tasks = tasks.filter((t) => t.id !== target.dataset.id);
        saveTasks();
        renderTasks();
      }
    });

    taskList.addEventListener("change", (e) => {
      const target = e.target;
      if (!(target instanceof HTMLSelectElement)) return;
      if (target.dataset.action !== "status") return;

      const task = tasks.find((t) => t.id === target.dataset.id);
      if (!task) return;

      task.status = target.value;
      saveTasks();
      renderTasks();
    });

    [searchInput, filterStatus, filterPriority].forEach((el) => {
      el.addEventListener("input", renderTasks);
      el.addEventListener("change", renderTasks);
    });

    clearDoneBtn.addEventListener("click", () => {
      tasks = tasks.filter((t) => t.status !== "done");
      saveTasks();
      renderTasks();
    });

    renderTasks();
  </script>
</body>
</html>
